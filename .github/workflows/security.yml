---
name: security
on:
  workflow_dispatch

permissions:
  actions: read
  security-events: write
  contents: read

jobs:

  DependenciesAnalysis:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisFull.sarif
            ./
        continue-on-error: true

      - name: upload sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DependenciesAnalysisFull.sarif
          category: dependencies

  SourceCodeAnalysis:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: run semgrep
        run: semgrep scan --config .semgrep --sarif --output SourceCodeAnalysisFull.sarif
        continue-on-error: true

      - name: upload sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: SourceCodeAnalysisFull.sarif
          category: source-code
